# wallet.lavalex.co — JP-WALLET (SPA estática)
# Instalar en: /etc/nginx/conf.d/wallet.lavalex.co.conf
# NO modificar lavalex.conf ni jarvis.lavalex.co.conf

server {
    listen 80;
    listen [::]:80;
    server_name wallet.lavalex.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wallet.lavalex.co;

    root /var/www/jp-wallet;
    index index.html;

    # SPA — React Router client-side
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash — cache largo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — no cache agresivo (nuevos deploys)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    ssl_certificate /etc/letsencrypt/live/lavalex.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lavalex.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
