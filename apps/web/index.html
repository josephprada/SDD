<!doctype html>
<html lang="es" data-accent="green-bolt" data-danger="red-classic" data-font="inter-default">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JP-WALLET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var mode = stored === "light" || stored === "dark" || stored === "system" ? stored : "dark";
        var resolved = mode;
        if (mode === "system") {
          resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themeMode = mode;

        var accent = localStorage.getItem("jp-wallet.accentPreset");
        var danger = localStorage.getItem("jp-wallet.dangerPreset");
        var font = localStorage.getItem("jp-wallet.typographyPreset");
        var validAccent = ["green-bolt", "cyan-neon", "amber-gold", "violet-pulse", "coral-heat"];
        var validDanger = ["red-classic", "rose-soft", "orange-alert", "crimson-deep"];
        var validFont = ["inter-default", "formal-serif", "elegant-italic", "handwriting"];
        var legacyFont = {
          "dm-sans": "formal-serif",
          "source-sans": "elegant-italic",
          "system-native": "handwriting"
        };
        if (font && legacyFont[font]) {
          font = legacyFont[font];
        }
        if (accent && validAccent.indexOf(accent) !== -1) {
          document.documentElement.dataset.accent = accent;
        }
        if (danger && validDanger.indexOf(danger) !== -1) {
          document.documentElement.dataset.danger = danger;
        }
        if (font && validFont.indexOf(font) !== -1) {
          document.documentElement.dataset.font = font;
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
