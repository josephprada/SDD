name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  WEB_DIST: apps/web/dist
  VPS_WEB_ROOT: /var/www/jp-wallet

jobs:
  deploy:
    name: Convex + Build + VPS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Convex (production)
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: bunx convex deploy -y

      - name: Build frontend
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL_PROD }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
        run: bun run build

      - name: Verify build output
        run: test -f "${{ env.WEB_DIST }}/index.html"

      - name: Prepare deploy SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key

      - name: Backup current release on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            if [ -d "${{ env.VPS_WEB_ROOT }}" ] && [ "$(ls -A ${{ env.VPS_WEB_ROOT }} 2>/dev/null)" ]; then
              sudo rm -rf ${{ env.VPS_WEB_ROOT }}.prev
              sudo cp -a ${{ env.VPS_WEB_ROOT }} ${{ env.VPS_WEB_ROOT }}.prev
            fi

      - name: Clean web root on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sudo rm -rf ${{ env.VPS_WEB_ROOT }}/*

      - name: Sync static files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_USER: ${{ secrets.VPS_SSH_USER }}
        run: |
          # Clean step empties the web root; skip --delete to avoid nginx-owned file errors
          rsync -avz --no-owner --no-group --no-times --omit-dir-times \
            -e "ssh -p ${VPS_PORT} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            "${{ env.WEB_DIST }}/" "${VPS_USER}@${VPS_HOST}:${{ env.VPS_WEB_ROOT }}/"

      - name: Fix permissions and reload Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            sudo chown -R nginx:nginx ${{ env.VPS_WEB_ROOT }}
            sudo nginx -t
            sudo systemctl reload nginx
            echo "Deploy OK: https://wallet.lavalex.co"
